                               <tr class="form">  <td >

                      <input type="password" id="SSN" size="30" min="9" maxlength="13" required oninput="" placeholder="required field"> </td></tr class="form">
                               <tr class="form">  <td>
                                      <tr class="form">  <td>

                     <tr class="form">      <td  ><label for="PhoneNum">Phone Number</label> <br>

				 <tr class="form">

                                    <input type="checkbox" id="race" name="Race" value="race">
                                    <label for="Race"> White or Caucasian </label><br>
                                <input type="checkbox" id="race" name="Race" value="race">
                                   <label for="Race"> Native American or Alaskan Native </label><br>
                                 <input type="checkbox" id="race" name="Race" value="race">
                                    <label for="Race"> Mixed </label><br>
                                   <input type="checkbox" id="race" name="Race" value="race">
                                    <label for="Race"> Choose not to identify/Other </label><br> </td>
                                  </tr>

        <tr class="form" >
            <td>
                <label for="PainScale">Pain Scale</label>

                <input type="range" class="slider" id="Pscale" name="PainScales" step="1" min="1" max="10"> 
                 10&nbsp;<br>
            </td>

                             <input type="text" id="AddressLine" size="30" maxlength="50" required oninput="" placeholder="required field"> </td></tr class="form">
